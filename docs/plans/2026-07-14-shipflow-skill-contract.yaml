version: "1.0"
ticket: "N/A"
epic: "N/A"
title: "shipflow: portable branching + release-automation skill"
date: "2026-07-14"

api_surface:
  - name: "detectRepoState"
    type: "function"
    signature: "detectRepoState(repoPath: string): RepoState"
    params:
      - name: "repoPath"
        type: "string"
        required: true
    returns: "RepoState { branches, workflows, templateFiles, protection, rulesets, existingConfig, releaseCredentialPresent, stateHash }"
    description: "Deterministic, read-only scan of live repo state (branches, workflow job names, rendered-template on-disk content hashes, classic branch protection, rulesets, release-credential secret presence)."
  - name: "computePlan"
    type: "function"
    signature: "computePlan(repoState: RepoState, config: Config): Plan"
    params:
      - name: "repoState"
        type: "RepoState"
        required: true
      - name: "config"
        type: "Config"
        required: true
    returns: "Plan { creates, updates, noops, sourceStateHash, liveRequiredChecks }"
    description: "Pure function, no side effects. Diffs repoState against config; classifies both GitHub-state changes and rendered-template writes into creates/updates/noops; liveRequiredChecks is the union of classic-protection and ruleset required-status-checks."
  - name: "applyPlan"
    type: "function"
    signature: "applyPlan(plan: Plan, opts: { dryRun: boolean, currentStateHash: string, force?: string[] }): ApplyResult"
    params:
      - name: "plan"
        type: "Plan"
        required: true
      - name: "opts.dryRun"
        type: "boolean"
        required: true
      - name: "opts.currentStateHash"
        type: "string"
        required: true
      - name: "opts.force"
        type: "string[]"
        required: false
    returns: "ApplyResult { applied, skipped, errors }"
    description: "Idempotently applies a confirmed plan. Refuses to run (no mutating calls) if currentStateHash != plan.sourceStateHash (TOCTOU guard). force is a scoped allowlist of specific handEditDetected entries to override, never a global flag."
  - name: ".github/shipflow.json"
    type: "interface"
    signature: "target-repo policy config, committed"
    params:
      - name: "branches"
        type: "{ main: string, dev: string }"
        required: true
      - name: "requiredChecks"
        type: "string[]"
        required: true
      - name: "mergeMethod"
        type: "{ featureToDevMethod: string, devToMainMethod: string }"
        required: true
      - name: "protectionOwner"
        type: "\"external\" | \"shipflow\""
        required: true
      - name: "release"
        type: "{ enabled, mode, tool, layout, releasePlease, releaseCredential }"
        required: true
      - name: "branchCleanup"
        type: "{ deleteOnMerge: boolean, protectedBranches: string[] }"
        required: true
      - name: "enforceAdmins"
        type: "boolean"
        required: true
    returns: "n/a (config file)"
    description: "Repo-level policy instance, written to the target repo's own tree (never inside the shipped skill package). Shareable/auditable — committed, not gitignored. config.example.json ships inside the skill package as the template."

invariants:
  checkable:
    - id: "INV-1"
      description: ".github/shipflow.json is tracked in the target repo (committed, never gitignored, never nested inside skills/shipflow/)"
      verification: "File exists at .github/shipflow.json in target repo git history; absent from .gitignore"
      check_method: "file-structure"
    - id: "INV-2"
      description: "config.branches.main and config.branches.dev always appear in branchCleanup.protectedBranches, expressed dynamically against configured names, never hardcoded literals"
      verification: "Read branchCleanup.protectedBranches and confirm it equals [config.branches.dev, config.branches.main] (order-independent) for any branch-name configuration"
      check_method: "code-inspection"
    - id: "INV-3"
      description: "apply.mjs contains no unconditional (non-idempotent) mutating gh api call"
      verification: "Grep for gh api / gh pr / gh label mutating calls not guarded by a current-state check; known limitation — lint-level smell check, not a proof against indirection"
      check_method: "grep"
    - id: "INV-4"
      description: "release.mode: \"auto\" is never enabled without release.releaseCredential set to a non-GITHUB_TOKEN repo-secret name; \"same-job\" is not a supported value"
      verification: "Config validation rejects mode:auto + releaseCredential in {GITHUB_TOKEN, same-job, unset}"
      check_method: "code-inspection"
    - id: "INV-5"
      description: "If mode:auto and the target repo structurally has package.json + SKILL.md + plugin.json present, releasePlease.extraFiles must have both skillMdVersionField and pluginJsonVersionField populated, and the dry-run byte-equality pre-flight must have passed before config was written"
      verification: "Config validation checks extraFiles population; setup wizard logs pre-flight pass/fail before writing config"
      check_method: "code-inspection"
    - id: "INV-6"
      description: "When protectionOwner:external, divergence between live required-checks and config.requiredChecks is surfaced on every re-run, never silently ignored"
      verification: "plan.mjs always computes and reports the diff between plan.liveRequiredChecks and config.requiredChecks under external ownership"
      check_method: "code-inspection"
    - id: "INV-7"
      description: "The release-pending label exists in the target repo whenever dev-to-main-automerge is installed, in every release.mode (not scoped to manual-gate)"
      verification: "gh label list / GET /repos/{owner}/{repo}/labels/release-pending returns the label after apply.mjs scaffolds dev-to-main-automerge"
      check_method: "code-inspection"
    - id: "INV-8"
      description: "Rendered workflow templates never diverge silently from a hand-edit — apply.mjs only overwrites a shipflow-managed template when its on-disk content-hash matches the last shipflow-rendered hash; mismatches block a normal apply pending explicit force"
      verification: "apply.mjs's template-write path compares repoState.templateFiles hash against config.renderedTemplateHashes before any overwrite"
      check_method: "code-inspection"
  testable:
    - id: "INV-9"
      description: "Running apply.mjs twice in a row on an unchanged repo produces zero mutating calls on the second run"
      verification: "Integration test against sandbox repo: call apply.mjs twice, assert zero mutating gh api calls on pass 2"
      test_tag: "contract:idempotency:inv-9"
    - id: "INV-10"
      description: "On a fresh sandbox repo where release-pending doesn't exist as a label, apply.mjs creates it, in every release.mode"
      verification: "Integration test: fresh repo, run apply.mjs under both manual-gate and auto, assert label exists"
      test_tag: "contract:label-provisioning:inv-10"
    - id: "INV-11"
      description: "A merged feature branch is deleted; dev survives a dev to main merge"
      verification: "Integration test against sandbox repo with delete_branch_on_merge + deletion ruleset configured"
      test_tag: "contract:branch-cleanup:inv-11"
    - id: "INV-12"
      description: "apply.mjs refuses to enable auto-merge when requiredChecks (or plan.liveRequiredChecks under external ownership) is empty"
      verification: "Integration/unit test: call apply.mjs with empty required-checks set, assert refusal with named error, no mutating call made"
      test_tag: "contract:fail-open-guard:inv-12"
    - id: "INV-13"
      description: "Re-running detect.mjs immediately before a real apply.mjs call, after simulating live-state drift, causes apply.mjs to abort rather than apply the stale plan"
      verification: "Integration test: compute plan, mutate live state out-of-band, run apply with dryRun:false, assert abort with no mutating calls"
      test_tag: "contract:toctou:inv-13"
    - id: "INV-14"
      description: "In manual-gate mode, a dev to main merge never auto-cuts a tag; the ask only fires on a subsequent interactive invocation that confirms the promotion PR is MERGED"
      verification: "Integration test: merge promotion PR, assert no tag cut automatically; assert ask does not fire against a still-open promotion PR"
      test_tag: "contract:manual-gate-timing:inv-14"
    - id: "INV-15"
      description: "The release-pending label mechanism correctly enumerates and asks about multiple concurrently-pending promotions, clearing each label only after its own dispatch is confirmed"
      verification: "Integration test: merge two dev to main promotions back-to-back before any interactive shipflow run, assert both surfaced and independently resolved"
      test_tag: "contract:multi-pending:inv-15"
    - id: "INV-16"
      description: "In auto mode with a correctly configured RELEASE_PAT, a conventional-commit fix: merged to main completes release-please's two-phase flow (commit -> release PR -> tag) with no manual step; both the promotion merge and the release-PR merge are asserted PAT-authored; a matching negative-case run with the default GITHUB_TOKEN confirms no release PR is ever opened"
      verification: "Integration test against a real non-default-token secret in a sandbox repo, asserting credential identity at both trigger hops, plus the GITHUB_TOKEN negative case"
      test_tag: "contract:release-automation-credential:inv-16"
    - id: "INV-17"
      description: "On a repo protected only by a ruleset (no classic branch protection), plan.liveRequiredChecks is correctly populated from the ruleset and the empty-checks refusal does not spuriously fire"
      verification: "Integration test against a ruleset-only sandbox repo"
      test_tag: "contract:ruleset-union:inv-17"

integration_points: []

ambiguity_resolutions:
  - id: "AMB-1"
    decision: "Zero-code branch cleanup via delete_branch_on_merge + deletion ruleset, instead of a custom cleanup script"
    confidence: "high"
    alternatives: ["Custom apply.mjs cleanup step calling the delete-branch API directly"]
    reasoning: "GitHub silently skips deleting a deletion-protected branch on merge (confirmed via GitHub Docs + community reports) — this repo's own repo-settings.sh already runs this exact mechanism in production, so it's empirically proven, not just documented."
    reversibility: "High — a repo-level setting plus a ruleset, trivially reversible"
  - id: "AMB-2"
    decision: "release.mode defaults conditionally (manual-gate if a triple-version-equality constraint or manual release workflow is detected, else auto), rather than a single fixed default"
    confidence: "high"
    alternatives: ["Always default to manual-gate (safe but under-delivers automation for greenfield repos)", "Always default to auto (breaks repos with an existing version-equality constraint)"]
    reasoning: "A fixed default optimizes for one repo shape at the expense of the other; conditional detection serves both, with ambiguous detection routed to an explicit user-confirm prompt rather than a silent default."
    reversibility: "Medium — user can always override at setup time; changing the computed default after adoption is a config edit, not a migration"
  - id: "AMB-3"
    decision: "Dropped the credential-free \"same-job\" release option entirely rather than building a bespoke polling/blocking-merge job"
    confidence: "high"
    alternatives: ["Build a bespoke polling job that waits for checks and merges via API, enabling a same-job release invocation"]
    reasoning: "Native GitHub auto-merge enables merge-when-ready and exits the job immediately — there is no live job at actual-merge time to hook a same-job release invocation into. A bespoke polling job is a materially different, more fragile architecture (job-timeout risk, polling failure modes) that deserves its own separately-scoped, separately-tested design if ever needed."
    reversibility: "High — RELEASE_PAT remains the only mode:auto path; a same-job alternative could be added later as a new option without touching existing config semantics"
  - id: "AMB-4"
    decision: "Keep release-please/auto mode in v1 scope rather than deferring it to a follow-up design, despite it being self-labeled experimental for the reference repo's own constraint shape and unused by the reference repo's shipped config"
    confidence: "medium"
    alternatives: ["Defer all of auto/release-please to a separately-scoped follow-up design; ship v1 as manual-gate + cleanup + automerge only"]
    reasoning: "User decision after the quality-gate flagged the scope question: requirement 5 (automatic tagging) needs to be satisfiable for adopting repos without this repo's specific constraint, on day one, not deferred to a hypothetical follow-up. The larger v1 surface and the unverified-but-integration-tested credential-authorship mechanism are accepted trade-offs."
    reversibility: "Low to reverse post-ship (removing a shipped, documented config surface is a breaking change for any adopter who used it) — this is the primary scope risk carried into implementation."
