version: "1.0"
ticket: "N/A"
epic: "N/A"
title: "devlog: icon catalog + geometry-enforced hero zone for cover-image quality"
date: "2026-07-17"

api_surface:
  - name: "renderCoverImage"
    type: "function"
    signature: "renderCoverImage(html: string, opts: { width: number, height: number, timeoutMs?: number, fontPath?: string, executablePath?: string } = {}): Promise<Buffer>"
    params:
      - name: "html"
        type: "string"
        required: true
      - name: "opts"
        type: "{ width: number, height: number, timeoutMs?: number, fontPath?: string, executablePath?: string }"
        required: false
        note: "opts itself defaults to {}, but width/height have no default — renderCoverImage synchronously throws 'width/height must be positive integers' before ever launching Chromium if they are missing or not positive integers (see lib/render_cover.mjs and tests/render_cover.test.mjs's 'validates its own arguments' case). Treating width/height as fully optional, as an earlier draft of this contract did under the name renderCover, is wrong."
    returns: "PNG buffer (unchanged signature from v0.8.1)"
    description: "Real function name is renderCoverImage, not renderCover — corrected from an earlier draft of this contract. No signature change to the existing params. NEW behavior: immediately before page.screenshot(), calls the new checkHeroZoneOverlap(page) helper and throws a descriptive Error in any of three structural cases: #hero-zone missing/duplicate, #hero-zone's rendered rect not matching the fixed HERO_ZONE bounding box within tolerance (round 3 addition — see checkHeroZoneOverlap below), or a catalog icon overlapping the hero zone (message matches /catalog icon .* overlaps hero zone/i). This is an intentional, documented extension of the function's existing throw contract: the current docstring states it throws on exactly three failure modes (render timeout, Chromium not installed, missing/unreadable font); this design adds a fourth, collectively covering all #hero-zone structural/geometry problems, and the docstring must be updated to say so in the same change."
  - name: "checkHeroZoneOverlap"
    type: "function"
    signature: "checkHeroZoneOverlap(page: Page): Promise<{ overlaps: boolean, offendingIcons: string[] }>"
    params:
      - name: "page"
        type: "playwright.Page"
        required: true
    returns: "overlaps: true if any [data-catalog-icon] element's getBoundingClientRect() intersects the #hero-zone element's rect; offendingIcons: the data-catalog-icon values that triggered it"
    description: "New, separately exported so it's unit-testable without invoking the full render pipeline. #hero-zone is structurally mandatory in composed HTML, not an opt-in marker: if querySelectorAll('#hero-zone') finds zero elements, this throws (surfaced by renderCoverImage as a composition failure) rather than treating the check as skipped/not-applicable. If it finds two or more elements sharing that id, that is also a failure (count !== 1) rather than silently resolving to the first match. **Edge-touching semantics, stated explicitly:** two rects that merely touch along an edge with zero overlapping area (e.g. a catalog icon's right edge exactly coincident with #hero-zone's left edge) count as NOT intersecting — only positive-area overlap trips this check. Rationale: making the hero-zone marker optional was found to silently disable the entire overlap guard with no error, for a brand-new convention an agent could easily forget — the fix is to make its absence a hard failure, not a bypass. **Geometry-match check (round 3 addition, fixes a fatal gap):** once exactly one #hero-zone element is confirmed, this helper also compares its getBoundingClientRect() against the exported HERO_ZONE constant (x:150 y:425 width:1300 height:400) on all four values, each allowed to differ by at most 2px (a fixed tolerance absorbing Chromium's own subpixel/rounding behavior, not a meaningful size/position allowance) — and throws a distinct descriptive error if any value falls outside that tolerance, BEFORE computing catalog-icon overlap. This closes a real gap the round-2 design left open: without this check, an agent could draw #hero-zone as a tiny box in a corner, trivially clear the overlap check (nothing catalog-derived anywhere near it), and the 'fixed grid/bounding-box contract' this design is named for would never actually be verified against anything rendered. Deliberately exact-match-within-tolerance, not containment: a containment check (hero-zone rect contained within HERO_ZONE) would NOT close this gap, since a tiny corner box is still contained within the larger fixed box — only equality-within-tolerance actually forces every post's hero into the identical, comparable box the contract claims to guarantee. Narrowed scope claim, extended for round 3: this guard inspects (a) the #hero-zone rect's match against the fixed HERO_ZONE box, and (b) elements actually carrying [data-catalog-icon] against that rect — it detects an agent misusing the catalog (e.g. composing two catalog icons connected by a line and calling that the hero) and an agent placing #hero-zone at the wrong position/size, but it does NOT detect an agent that avoids the catalog entirely and free-hands lookalike shapes inside a correctly-sized #hero-zone, nor whether the hero's interior key points snap to the 25px grid (Component 2) — the guard checks the outer box only, not interior freehand geometry. Both remaining gaps stay covered only by human review at publish time (the existing cover-custom-illustration prose invariant). **Round 4 clarification, resolving a fatal design conflict: the binary any-intersection overlap rule (AMB-CQ-2) has no sanctioned exception, by construction.** An earlier round's composition-slot descriptions implied a catalog icon could legitimately sit inside #hero-zone (as the 'hero + supporting element' slot's secondary icon, or as one of the 'two-node before/after' slot's two nodes) — but since this function throws on ANY [data-catalog-icon] rect intersecting #hero-zone with no tolerance, a sanctioned catalog icon inside the hero zone would be geometrically identical to the exact violation the guard exists to catch, and no mechanical check can tell them apart. The design is corrected at the source instead of here: no composition slot ever places a catalog icon inside #hero-zone (see the corrected slot definitions referenced in the SKILL.md integration_point and AMB-CQ-2) — the mechanism and both two-node shapes are always freehand, and a catalog icon appears, if at all, only as a small accent glyph outside the hero zone. With that correction in place, 'a catalog icon overlaps #hero-zone' and 'the catalog was misused' are the same event; the binary rule needs no whitelist/containment carve-out because there is no longer a legitimate case it would need to exempt. **Clarification (round 2, extended round 3): this function has three structurally different outcomes, not one.** The missing-#hero-zone, duplicate-#hero-zone, AND geometry-mismatch conditions all throw directly from inside this helper (structural/composition failures, surfaced by renderCoverImage as a throw). A found, unique, correctly-positioned #hero-zone element instead resolves normally to { overlaps, offendingIcons } regardless of whether overlaps is true or false — overlap-found and overlap-not-found are both successful resolutions of the check, and it is the caller (renderCoverImage) that decides whether overlaps: true should itself become a thrown error. Callers/tests must not assume every non-resolution path or every failure signal looks the same."
  - name: "loadStyleGuide"
    type: "function"
    signature: "loadStyleGuide(): { text: string, iconCatalog: string | null }"
    params: []
    returns: "text: the existing style-guide.md content (unchanged bytes). iconCatalog: the content of image-style/icons.md if it exists, else null."
    description: "Widened return shape — confirmed against the current implementation: today's loadStyleGuide() returns a plain string (the style guide's raw text; see lib/cover_gen.mjs and tests/cover_gen.test.mjs). This design changes that to an object, { text, iconCatalog }, where text carries exactly what the old return value carried. This is a breaking shape change at the function boundary, NOT just an additive field — every existing call site that treats the old return value as a string (string concatenation, JSON.stringify, direct emission) must be updated. **Round 6 correction: there are TWO known call sites, not one** — cmdCoverContext (see below) is the production call site; tests/cover_gen.test.mjs's test 'loadStyleGuide reflects whether the real install exists at CONFIG_DIR' also calls loadStyleGuide() directly and asserts `typeof text === 'string'` on the RAW return value, which breaks (typeof an object is 'object', not 'string') once the shape widens, on any machine where the style guide is actually installed. This contract requires BOTH updates as part of the same change, not as an incidental side effect discovered later: cmdCoverContext must destructure the new shape (see below), and the test must be changed to `const { text } = loadStyleGuide(); assert.equal(typeof text, 'string');` before asserting. Missing icons.md degrades to iconCatalog: null and composition proceeds without a catalog — mirrors the existing cover-never-blocks-publish invariant for a missing style guide, extended to the new file."
  - name: "cmdCoverContext (CLI: devlog cover-context)"
    type: "cli-command"
    signature: "devlog cover-context <project> <slug> --clone <cloneDir> [--staging <staging-dir>]"
    params:
      - name: "project"
        type: "string"
        required: true
      - name: "slug"
        type: "string"
        required: true
      - name: "--clone"
        type: "string (path)"
        required: true
      - name: "--staging"
        type: "string (path)"
        required: false
    returns: "JSON: { styleGuide, references, iconCatalog } on success, or { styleGuide, references: [], error: 'reference-lookup-failed', message, iconCatalog } on the getRecentCovers-failure path — styleGuide stays a plain string (byte-identical to today's output) on BOTH paths, iconCatalog is a new sibling field on BOTH paths."
    description: "No new flag. REQUIRED implementation change, called out explicitly (round 2 correction — the prior draft's 'gains the iconCatalog field' language implied no other code needed to change, which is false), and covering BOTH emitJSON call sites (round 3 correction — the round-2 draft only rewrote the success-path call, leaving the catch-block error-path call referencing a `styleGuide` identifier that no longer exists post-destructure, which would throw an uncaught ReferenceError from inside an already-executing catch block instead of emitting the documented reference-lookup-failed JSON error). **Round 6 correction (fixes a fatal scoping bug in an earlier draft of this very entry): `cmdCoverContext` has TWO SEPARATE try/catch blocks, confirmed against the real implementation (bin/devlog.js, lines ~770-791) — not one, and not a single try wrapping both calls.** Block 1 wraps only `loadStyleGuide()` and catches a style-guide-missing error (emits `{ error: 'style-guide-missing', message }` and returns). Block 2 wraps only `getRecentCovers()` and catches `reference-lookup-failed`; its try body contains the success-path `emitJSON({ styleGuide, references });` and its catch body contains the error-path `emitJSON({ styleGuide, references: [], error: 'reference-lookup-failed', message: e.message });`. Both of Block 2's paths need `text`/`iconCatalog`, which are only produced inside Block 1 — so they must be declared OUTSIDE both blocks and survive from Block 1 into Block 2. The required change, shown as the actual two-try-block structure an implementer must produce (not a single destructuring line in isolation): `let text, iconCatalog;` declared before Block 1; inside Block 1's try, a BARE destructuring assignment `({ text, iconCatalog } = loadStyleGuide());` (NOT `const { text, iconCatalog } = loadStyleGuide();` — `const` here would scope the bindings to Block 1 alone and make them unreachable, i.e. a ReferenceError, inside Block 2); Block 2's try becomes `const references = getRecentCovers({ ...unchanged... }); emitJSON({ styleGuide: text, references, iconCatalog });`; Block 2's catch becomes `emitJSON({ styleGuide: text, references: [], error: 'reference-lookup-failed', message: e.message, iconCatalog });`. i.e. destructure once via `let` + bare assignment ahead of both blocks, and re-map `styleGuide: text` at every emitJSON call site across both blocks, not pass the object straight through at only one of them, and not `const`-scope the destructure inside the first block. Without this explicit two-block, `let`-outside-both structure, the CLI's existing styleGuide JSON field either silently becomes an object instead of a string (if neither call site is fixed), crashes the process with an uncaught ReferenceError on the error path (if only the success path is fixed), or crashes with a DIFFERENT uncaught ReferenceError from Block 2 entirely (if `text`/`iconCatalog` are declared with `const` inside Block 1 instead of `let` outside both blocks) — for every existing caller of `cover-context`, breaking them with no graceful error and no test failure unless one specifically exercises the affected branch and asserts typeof styleGuide === 'string'."
  - name: "cmdBackfillCovers (CLI: devlog backfill-covers list)"
    type: "cli-command"
    signature: "devlog backfill-covers list --clone <cloneDir> [--project <key>] [--out <staging-dir>] [--all]"
    params:
      - name: "--all"
        type: "boolean"
        required: false
        note: "New flag, default false. Fixes a fatal round-2 finding: cmdBackfillCovers's current implementation (bin/devlog.js) filters candidates with `merged.filter((e) => e && !e.cover)` — it lists only entries missing a cover. Every one of the ~51 real entries in daily-dev-log already has cover: true from the 0.8.1 batch, so running `backfill-covers list` today (no --all) returns [] for every project — there is nothing for this design's regeneration to iterate over. When --all is passed, the !e.cover filter is skipped and every manifest entry is listed regardless of cover status. Default false preserves today's behavior unchanged for the command's original purpose (finding posts that never got a cover); --all is additive/opt-in."
    returns: "JSON array of candidate entries (same shape as today) — --all only changes which entries qualify as candidates before the existing --project/--out filters and sort run."
    description: "Real code change to bin/devlog.js's cmdBackfillCovers: one new parseArgs boolean option plus one conditional around the existing `.filter((e) => e && !e.cover)` call (skip the filter entirely when --all is true). This is the concrete fix for the fatal finding that the prior draft's 'backfill-covers list already lists every manifest entry' claim was false for the real backfill-all-51-covers use case this design exists to perform. Minor, round 3 addition: the confirmed real implementation's hardcoded usage-error string (thrown when the subcommand isn't `list`: `'Usage: devlog backfill-covers list --clone <cloneDir> [--project <key>] [--out <staging-dir>]'`) must also be updated in the same change to append `[--all]`, so the CLI's own usage message doesn't undersell its own flag set."

invariants:
  checkable:
    - id: "COVER-Q-1"
      description: "image-style/icons.md exists at the repo-tracked path (skills/devlog/skills/devlog/image-style/), and every catalog entry has real inline <svg> markup — no placeholder/TODO icon bodies. The installed-path copy (~/.claude/skills/devlog/image-style/) only exists after a user runs `devlog init` and is not itself independently checkable in this repo/CI — the repo path is the source of truth this invariant actually verifies, mirroring how font.ttf and style-guide.example.md already work (installer copies repo -> installed verbatim, per cmdInit in bin/devlog.js)."
      verification: "Read the file at skills/devlog/skills/devlog/image-style/icons.md, confirm every named icon entry contains an <svg>...</svg> block with at least one real path/circle/rect/line/polygon element"
      check_method: "code-inspection"
      test_home: "tests/skill_contract.test.mjs"
    - id: "COVER-Q-2"
      description: "The hero-zone bounding box (x:150 y:425 width:1300 height:400) and the 25px coordinate grid are defined exactly once, as exported constants in lib/render_cover.mjs (e.g. HERO_ZONE, HERO_GRID_UNIT), and image-style/style-guide.example.md's prose states the identical numbers rather than an independently-maintained copy — NOT style-guide.md, which does not exist in this repo (installer-created only, at devlog init time; confirmed only style-guide.example.md is tracked). Because devlog init copies style-guide.example.md to the installed style-guide.md verbatim, keeping the example in sync with the code constants is sufficient for the installed copy to inherit it automatically — there is no separate style-guide.md to check in this repo."
      verification: "Grep lib/render_cover.mjs for the exported HERO_ZONE/HERO_GRID_UNIT constants; grep image-style/style-guide.example.md for the combined literal `x:150 y:425 width:1300 height:400` (the exact HERO_ZONE constant format already used elsewhere in both documents) and the grid value. **Round 10 tightening (matches the grid-value check's own already-established combined-literal pattern):** the coordinate check must target this single combined literal, not four independent number checks for `150`/`425`/`1300`/`400` — a four-independent-number check only avoids vacuity today by coincidence (no other required literal in the file happens to contain one of those bare numbers), unlike the grid-value check below, which was deliberately hardened onto the combined phrase `25px coordinate grid` after two rounds of fixing exactly this class of vacuity bug. Round 5 correction (fixes a round-4 regex bug): the grid-value check MUST use the literal substring `25px` — NOT the word-boundary pattern `\\b25\\b` that round 4 offered as an interchangeable alternative, which is broken and does not match \"25px\" at all (verified: `/\\b25\\b/.test(\"a 25px coordinate grid\")` is `false`, because `\\b` only fires at a word/non-word transition, and the `5`→`p` transition inside \"25px\" is word-char-to-word-char) — and NOT a bare substring search for `25` either, because the coordinate `425` already contains `25` as a substring, so a naive `grep -o \"25\"` would trivially match regardless of whether the document states a 25px grid anywhere. **Round 9 correction (fixes a vacuity the round-5 fix didn't anticipate, the mirror image of the bug round 5 itself fixed): the bare literal `25px` is no longer sufficient on its own.** Once COVER-Q-12 also mandates the same file contain the literal phrase \"25px buffer above\" (Component 1's accent-icon rule), `image-style/style-guide.example.md` contains \"25px\" in two unrelated sentences — the grid-snap rule this invariant verifies, and the accent-icon buffer rule (a different concern, checked separately by COVER-Q-12). A future edit deleting the entire grid-snap sentence while leaving the accent-icon paragraph intact would still pass a bare-`25px` check off that other sentence alone. The check is corrected to grep for the combined literal `\"25px coordinate grid\"` instead — the exact phrase the design doc already uses to state the grid rule (Component 2: \"a 25px coordinate grid every hero shape's key points must snap to\") — which is unique to the grid-snap rule and shares no substring overlap with COVER-Q-12's \"25px buffer above\"; a mismatch (or absence of a match) is a build-time-catchable bug, not just a style nit"
      check_method: "grep"
      test_home: "tests/skill_contract.test.mjs — new dedicated test case; grep-based, run at the same point in the suite as the existing prose-invariant checks (see 'every prose invariant is present in SKILL.md')"
    - id: "COVER-Q-3"
      description: "skill-invariants.json's existing cover-custom-illustration entry (SKILL.md prose: \"a cover that just re-renders the title in large text is a failure\") is preserved with its pattern unchanged; only its rationale is extended to note independence from (not supersession by) the new geometry guard"
      verification: "Diff skill-invariants.json before/after this change: the cover-custom-illustration entry's id and pattern fields are byte-identical; only rationale differs"
      check_method: "code-inspection"
      test_home: "tests/skill_contract.test.mjs"
    - id: "COVER-Q-4"
      description: "A new skill-invariants.json code array (schema extension — entries reference a file other than SKILL.md via a new `file` field) contains cover-catalog-hero-overlap-guard, asserting the getBoundingClientRect/overlap-throw mechanism exists in lib/render_cover.mjs. Concrete entry shape (mirrors the existing prose array's {id, pattern, rationale}, adding `file`): { \"id\": \"cover-catalog-hero-overlap-guard\", \"file\": \"lib/render_cover.mjs\", \"pattern\": \"(?:getBoundingClientRect[\\\\s\\\\S]{0,400}hero-zone|hero-zone[\\\\s\\\\S]{0,400}getBoundingClientRect)\", \"rationale\": \"The catalog-icon/hero-zone overlap check must stay wired into renderCoverImage() — losing it silently reopens the gap where a catalog icon can stand in for the required bespoke hero illustration.\" }. `file` is resolved relative to the skill root (skills/devlog/skills/devlog/), the same base path SKILL.md's own checks already use. **Order-independence (round 2 correction):** the pattern is now an alternation — getBoundingClientRect-then-hero-zone OR hero-zone-then-getBoundingClientRect, within 400 chars either way — rather than a single sequential pattern. A sequential-only pattern would only match an implementation that calls getBoundingClientRect() before referencing hero-zone in source-text order; an equally correct implementation could look up the #hero-zone element's rect first and then loop calling .getBoundingClientRect() per catalog icon afterward, which reverses that order and would permanently fail a sequential-only pattern against correct code. The top-level skill-invariants.json \"comment\" field (currently describing only the prose array's purpose) must also be updated in the same change to describe the new code array's purpose — otherwise the file's own top-level documentation undersells what it checks."
      verification: "skill-invariants.json parses as valid JSON with a top-level code array whose entries have {id, file, pattern, rationale}; tests/skill_contract.test.mjs's invariant loop is extended to, for each code-array entry, read the file named by `file` (relative to skill root) and regex-test `pattern` against its content — generalizing the existing prose-array mechanism (which hardcodes SKILL.md) to a caller-specified file — and demonstrably fails if the overlap-check code is deleted from render_cover.mjs. Separately, confirm the top-level \"comment\" field's text mentions both the prose and code arrays (a simple substring/manual read, not a regex test — this is documentation, not enforceable behavior)."
      check_method: "code-inspection"
      test_home: "tests/skill_contract.test.mjs"
    - id: "COVER-Q-12"
      description: "Round 6 addition, closes a coverage gap: the round-5 accent-icon placement rule (bottom edge no lower than y:400, a 25px buffer above HERO_ZONE's y:425 top edge), the 'never both at once' reconciliation between the catalog-icon accent and the existing terminal-glyph accent convention, and (round 8) the round-7 two-node decoration-only rule are all stated, verbatim, in prose in image-style/style-guide.example.md and/or SKILL.md. Unlike every other prose rule in this design — hero-zone coordinates/grid (COVER-Q-2), cover-custom-illustration (COVER-Q-3) — this rule had zero checkable-invariant coverage; a future edit could silently drop it from either file and nothing would catch it. **Round 7 correction (fixes a fatal vacuity in the original check):** the original verification grepped for the bare numbers `400`/`25px`, but COVER-Q-2 independently mandates the same files contain the HERO_ZONE-box text `x:150 y:425 width:1300 height:400`, which already contains both `400` and `25px` as substrings — meaning the bare-number check passed automatically regardless of whether the accent-icon placement rule was present at all, and a future edit deleting the entire accent-icon paragraph would not have been caught. The check is corrected to target text unique to the accent-icon rule, not shared substrings. **Round 8 correction (closes a coverage gap round 7 left open):** the two-node slot's decoration-only rule (Component 2 / design.md's round-7 paragraph) was bolded the same way as the other grep-anchored sentences here but was never folded into this check — nothing caught a future edit dropping that rule while the other three phrases kept passing. A fourth exact literal phrase is added below, using wording already present verbatim in the design doc's round-7 paragraph."
      verification: "Grep image-style/style-guide.example.md and/or SKILL.md for exact literal phrases unique to the accent-icon rules — `bottom edge no lower than y:400` and `25px buffer above` — neither of which is a substring of COVER-Q-2's required HERO_ZONE-box literal (`x:150 y:425 width:1300 height:400`), so this check cannot pass off COVER-Q-2's independent content the way the old bare-number check could. AND grep for the exact reconciliation sentence `Never combine the catalog-icon accent and the terminal-glyph accent in the same cover.` AND (round 8 addition) grep for the exact two-node decoration-only phrase `the accent icon's presence must not be read as belonging to either node` — an exact-string match, not a paraphrase check, anchored the same way COVER-Q-2's own `25px` token and the COVER-Q-3 cover-custom-illustration entry are both anchored to exact strings rather than descriptions. Checkable by inspection only, not mechanically enforced beyond that — same 'prose exists' category as COVER-Q-2/COVER-Q-3, not a new geometry check. It does not and cannot verify that any actually-rendered cover honors the rule, only that the rule's exact text is present. **Clarification on 'and/or':** this means the union of both files — each of the four required phrases must appear in at least one of image-style/style-guide.example.md or SKILL.md, not necessarily in both, and different phrases are not required to all appear in the same file."
      check_method: "grep"
      test_home: "tests/skill_contract.test.mjs — new dedicated test case, alongside the existing prose-invariant checks"
  testable:
    - id: "COVER-Q-5"
      description: "renderCoverImage(html, opts) throws when a [data-catalog-icon] element's rendered rect intersects #hero-zone's rect"
      verification: "Unit test: synthetic HTML fixture with a #hero-zone div and a [data-catalog-icon] element positioned with overlapping coordinates; call renderCoverImage(html, { width: 1600, height: 900, fontPath: <real test font path> }) — valid width/height/fontPath so the call actually reaches the overlap-check logic instead of failing earlier validation (argument shape, font-missing) first; assert it rejects with the overlap error. Round 4 correction (precondition fix): the fixture's #hero-zone div MUST itself be positioned/sized at the exact HERO_ZONE coordinates (x:150 y:425 width:1300 height:400, within the documented 2px tolerance) — since the round-3 geometry-match check (COVER-Q-11) runs before this overlap check inside the same checkHeroZoneOverlap helper, a #hero-zone positioned anywhere else would throw the geometry-mismatch error first, meaning the test would be exercising the wrong throw reason rather than the overlap-check logic it's meant to verify."
      test_tag: "contract:cover-quality:cover-q-5"
    - id: "COVER-Q-6"
      description: "renderCoverImage(html, opts) succeeds when the same catalog icon is positioned entirely outside #hero-zone's rect"
      verification: "Unit test: identical fixture with non-overlapping coordinates; call renderCoverImage(html, { width: 1600, height: 900, fontPath: <real test font path> }); assert it resolves to a PNG buffer, no throw. Round 4 correction (precondition fix, same reasoning as COVER-Q-5): the fixture's #hero-zone div MUST be positioned/sized at the exact HERO_ZONE coordinates (within the 2px tolerance) so this fixture actually reaches and clears the overlap-check logic rather than throwing on the geometry-mismatch check (COVER-Q-11) first — a #hero-zone positioned elsewhere would make this 'must render successfully' assertion fail for an unrelated reason (or coincidentally pass for the wrong reason), invalidating the test."
      test_tag: "contract:cover-quality:cover-q-6"
    - id: "COVER-Q-7"
      description: "loadStyleGuide() degrades gracefully (iconCatalog: null, no throw) when image-style/icons.md is absent, and composition/publish proceeds without a catalog rather than blocking"
      verification: "Unit test: stub filesystem with no icons.md present; loadStyleGuide() returns iconCatalog: null; downstream cover-context/publish-entry paths do not throw on this null. **Round 6 correction: this is not purely additive to tests/cover_gen.test.mjs.** The existing test 'loadStyleGuide reflects whether the real install exists at CONFIG_DIR' in the same file calls loadStyleGuide() directly and asserts `typeof text === 'string'` on its RAW return value — that assertion must be updated in the same change to destructure first (`const { text } = loadStyleGuide(); assert.equal(typeof text, 'string');`), or it fails (on the branch where the style guide is actually installed) the moment the return shape widens to { text, iconCatalog }."
      test_tag: "contract:cover-quality:cover-q-7"
    - id: "COVER-Q-8"
      description: "tests/skill_contract.test.mjs's extended invariant loop is a real regression test for COVER-Q-4, not just schema validation — it fails red if the overlap-guard code is removed from render_cover.mjs"
      verification: "Temporarily stub/remove the overlap-check code path in a test double of render_cover.mjs's source and confirm the invariant test fails; restore and confirm it passes"
      test_tag: "contract:cover-quality:cover-q-8"
    - id: "COVER-Q-9a"
      description: "renderCoverImage(html, opts) throws when the composed HTML has no #hero-zone element at all — mandatory, not a silent skip of the geometry check. (Round 3 split: previously bundled with the duplicate-#hero-zone case under one COVER-Q-9 id/test — split into 9a/9b so a future regression in only one sub-case still fails traceably instead of being masked by whichever assertion in a combined test happens to run first.)"
      verification: "Unit test: fixture HTML with zero #hero-zone elements and valid width/height/fontPath; rejects with a descriptive error naming the missing-hero-zone condition"
      test_tag: "contract:cover-quality:cover-q-9a"
    - id: "COVER-Q-9b"
      description: "renderCoverImage(html, opts) throws when the composed HTML has two or more elements sharing the #hero-zone id — duplicate, not silently resolved to the first DOM match. (Round 3 split from the former combined COVER-Q-9 — see COVER-Q-9a.)"
      verification: "Unit test: fixture HTML with two elements sharing #hero-zone and valid width/height/fontPath; rejects with a descriptive error naming the duplicate-hero-zone condition"
      test_tag: "contract:cover-quality:cover-q-9b"
    - id: "COVER-Q-10"
      description: "devlog backfill-covers list --all lists every manifest entry regardless of cover status, bypassing the existing !e.cover filter; devlog backfill-covers list (no --all) is unchanged from today — missing-cover-only. Fixes the fatal round-2 finding that, without this flag, backfill-covers list returns [] against every project in the real daily-dev-log repo (all ~51 entries already have cover: true)."
