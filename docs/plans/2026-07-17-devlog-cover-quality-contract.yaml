ambiguity_resolutions:
  - id: "AMB-CQ-1"
    decision: "Hero-zone coordinates and grid unit live as exported constants in lib/render_cover.mjs; image-style/style-guide.example.md's prose (the repo-tracked source of truth — style-guide.md itself is installer-created and not present in this repo) must state the identical numbers, checked mechanically (COVER-Q-2) rather than trusted to manual review."
    confidence: "high"
    alternatives: ["State the numbers independently in prose and in code with no cross-check, relying on a human reviewer to notice drift"]
    reasoning: "The whole premise of this design is that a prose-only safeguard (the existing cover-custom-illustration regex) already proved insufficient once. Letting the hero-zone numbers exist as an unchecked duplicate between prose and code would reintroduce the identical class of silent-drift risk this design otherwise closes."
    reversibility: "high"
  - id: "AMB-CQ-2"
    decision: "Any geometric intersection between a catalog icon's rect and the hero zone's rect fails the check — binary, no tolerance percentage."
    confidence: "high"
    alternatives: ["Allow up to some percentage overlap before failing, to tolerate minor incidental overlap", "Round 4: allow catalog icons inside the hero zone when they're part of a declared composition slot (e.g. a data-slot-role marker the guard whitelists) — considered and rejected: this would require trusting the agent's own self-labeling of 'sanctioned' vs. 'violation' placement, which defeats the guard's purpose, since an agent substituting catalog icons for the hero could apply the same self-label to the exact violation the guard exists to catch. A mechanical check cannot distinguish sanctioned from unsanctioned catalog-icon-in-hero-zone placement by geometry alone; the only way to keep the binary rule meaningful is to ensure no sanctioned case exists in the first place (see Component 2 / SKILL.md correction)."]
    reasoning: "The guard exists to guarantee catalog icons never substitute for or crowd into the one required bespoke illustration. Any tolerance threshold would need its own justification and tuning with no evidence it's needed; binary is simpler, stricter, and matches the actual intent (catalog icons belong in the remaining canvas, full stop). **Round 4 clarification (fatal-finding resolution): this binary rule does not conflict with any composition slot**, because neither of the two named slots (Component 2; round 5 merged the former 'hero + supporting element' into 'single centered hero' — see AMB-CQ-5) ever places a catalog icon inside the hero zone by design — the optional kicker-area catalog-icon accent (round 5: a per-post toggle, not a separate slot, and — round 6 correction — available for EITHER slot, not exclusively 'single centered hero') sits outside the hero zone entirely, at or above y:400 per its round-5 placement-geometry rule, and the 'two-node before/after' slot's two nodes are always freehand shapes, never catalog icons. A catalog icon overlapping #hero-zone is therefore never a sanctioned composition choice — it is unambiguously either an accent icon that drifted into the hero rect by mistake, or an agent substituting catalog icons for the required freehand hero, and both are exactly the failure this guard exists to catch. No tolerance or whitelist mechanism is needed to separate 'sanctioned' overlap from 'violation' overlap, because a sanctioned-overlap category doesn't exist in the corrected design."
    reversibility: "high"
  - id: "AMB-CQ-3"
    decision: "Full ghostwriter-style fixed template family rejected as the primary composition mechanism; the hero illustration stays freehand, only gaining a grid/bounding-box contract, not a set of named layouts with fixed shapes."
    confidence: "high"
    alternatives: ["Adopt ghostwriter's full template-family pattern (a small fixed set of complete layouts, agent fills in icons only, no freehand drawing)"]
    reasoning: "devlog has a hard requirement ghostwriter's format does not: two different posts' covers must never look visually similar. A template family converges toward recognizable 'types' by design (this is observably true of ghostwriter's own card family) — acceptable for LinkedIn cards, a direct regression of the exact 'bland/repetitive' bug already fixed once this cycle for devlog specifically."
    reversibility: "medium — would require re-authoring SKILL.md's composition instructions and could not cleanly reuse covers rendered under the freehand-hero system without a second regeneration pass"
  - id: "AMB-CQ-4"
    decision: "Backfill verification uses 2-3 sampled covers per project (not full manual review of all 51, and not fully automated judge-only scoring), specifically so the sample can be checked against itself for within-project repetition — one sample per project was rejected because comparing a single cover yields zero pairs and cannot detect the non-negotiable requirement ('two different posts should never produce visually similar covers') at all. Round 2 addition: the same 2-3-per-project sample set also gets one additional cross-project comparison pass — all sampled covers across all ~6 projects laid out side by side and checked for cross-project shape/composition/icon-choice repetition, not just within-project repetition. Round 3 addition (closes a named-artifact/owner gap): no new review artifact is built for either pass. The existing staging-dir index.html contact sheet, written by regenerateContactSheet() in bin/devlog.js and already invoked automatically on every render-cover call (confirmed against the real implementation; also documented in CHANGELOG.md as the intended backfill review UX — 'reviewed via a contact sheet'), IS the artifact used for both the per-project sample review and the cross-project pass, since it already groups every rendered cover by project in one page. The reviewer for both passes is the orchestrating Claude Code session/agent conducting the backfill, which presents the relevant contact-sheet images/sections to the user for the final go/no-go — the same review flow already used for the original 49-post backfill earlier this session."
    confidence: "high (explicit user decision, extended in round 2 to close a real gap)"
    alternatives: ["Full manual review of every regenerated cover", "Automated adversarial judge-agent scoring with minimal human review", "One sampled cover per project (rejected: cannot detect within-project repetition — the actual requirement — since a single sample has no second cover to compare against)", "Within-project sample review only, no cross-project pass (rejected in round 2: the non-negotiable rule in style-guide.example.md — 'two different posts should never produce visually similar covers' — is not scoped to 'same project', and all 6 real projects are software-release logs drawing on the same generic technical vocabulary the icon catalog itself is organized around, making cross-project convergence a real, live risk rather than a hypothetical)"]
    reasoning: "The new geometry guard (COVER-Q-5/COVER-Q-9a/COVER-Q-9b/COVER-Q-11) mechanically catches the specific structural regressions (catalog icon standing in for the hero, a missing/duplicate hero zone, or a wrongly-positioned/sized hero zone) that a human spot-check might miss across 51 covers; the remaining subjective question is two-fold — 'does this look good' (answerable from a single cover) and 'do these look too similar to each other' (which requires at least 2 covers from the same project to even ask the question, and — as round 2 identified — at least one cross-project comparison to ask the question at the scope the actual rule is stated at). 2-3 per project is the minimum that makes the within-project comparison possible, and one additional side-by-side pass across all sampled covers is the minimum that makes the cross-project comparison possible, without the full time cost of reviewing all 51 individually or all pairs across all projects."
    reversibility: "high — if the sampled review (within- or cross-project) starts finding real problems, escalating to full review for the affected project(s), or to a larger per-project sample, is a one-line process change, not a code change"
  - id: "AMB-CQ-5"
    decision: "Round 5: merge the 'hero + supporting element' composition slot into 'single centered hero,' rather than keeping three named slots — the design now has two named hero-zone composition slots: single centered hero and two-node before/after. Round 6 correction (fixes a self-contradiction between this field and the reasoning field below, which already said the accent-icon toggle is layered on top of EITHER slot): the optional kicker-area accent-icon toggle (Component 1) is an independent per-post decision available for either of the two slots, not nested exclusively under 'single centered hero' — nothing about the accent's placement (entirely outside #hero-zone, near the kicker/title area) depends on which composition occupies the hero zone. Round 7 addition: for the two-node slot specifically, the accent is documented as decoration only, never compositionally paired with either node — resolving an ambiguity the round-6 fix left open (the two-node slot has two focal points rather than one, so the accent's kicker-area position — composition-dependent, per the style guide's actual 'in the remaining negative space' language, not a fixed corner — could otherwise read as an unintended pairing with whichever node sits nearest it). Round 8 correction: an earlier draft of this field cited a 'conventional top-left kicker position' that is not in the style guide; corrected to the style guide's actual composition-dependent language, with no change to the underlying decision."
    confidence: "high"
    alternatives: ["Keep three named slots, but give 'hero + supporting element' a real hero-zone-internal compositional difference from 'single centered hero' (e.g. a deliberately offset/asymmetric mechanism placement) instead of merging it away — rejected as more complex than necessary: it would require inventing and documenting a new freehand-composition rule with no evidence a third distinct look is needed, purely to preserve a slot count that round 4's own correction had already hollowed out."]
    reasoning: "Round 4 moved 'hero + supporting element's accent icon entirely outside #hero-zone to resolve the fatal AMB-CQ-2 conflict with the overlap guard. That left its hero-zone-internal content — one freehand mechanism, nothing else — identical to 'single centered hero'; the only remaining difference was an external, title-area accent with no mechanical link to which slot was picked. Keeping it as a nominally separate third slot was bookkeeping redundancy, not a real design decision. Retiring the 'hero + supporting element' name and treating the accent icon as a per-post toggle is the simpler, more honest description of what the design actually does: two distinct hero-zone compositions (one mechanism, or two nodes), with an independent yes/no accent-icon decision layered on top of EITHER — the toggle was never conceptually tied to 'single centered hero' specifically, only to whichever slot round 4's correction happened to be narrating at the time."
    reversibility: "high — reintroducing a third slot (option b above) would be a documentation-only change (SKILL.md, style-guide.example.md, this design/contract) with no code impact, since the geometry guard was never slot-aware to begin with"
