version: "1.0"
ticket: "N/A"
epic: "N/A"
title: "shipflow: multi-pattern workflow templates (dev-main-promotion, github-flow, gitflow) with autodetection"
date: "2026-07-16"

api_surface:
  - name: "listPatterns"
    type: "function"
    signature: "listPatterns(): Array<{ id: string, templateTargetPaths: string[] }>"
    params: []
    returns: "Array of every registered pattern's id and templateTargetPaths (the fixed .github/workflows/*.yml path(s) that pattern always writes)"
    description: "Enumerates every pattern module registered in pattern-registry.mjs. Used by SKILL.md to present template choices when detection is ambiguous or the repo is greenfield, AND by detect.mjs to build its config-independent template-path union (flat-mapping templateTargetPaths across every entry) without importing any lib/patterns/<id>/index.mjs module directly. This is the mechanism that keeps 'adding a 4th pattern needs no changes to detect.mjs' true: a new pattern registers once inside pattern-registry.mjs, and every caller that only calls listPatterns()/resolvePattern()/scoreAll() picks it up automatically."
  - name: "resolvePattern"
    type: "function"
    signature: "resolvePattern(config: Config): PatternModule"
    params:
      - name: "config"
        type: "Config"
        required: true
    returns: "The pattern module matching config.workflowPattern, defaulting to the dev-main-promotion module when the field is absent"
    description: "Backward-compatibility resolver. Never throws on a missing workflowPattern field — absence is a valid, meaningful state (pre-multi-pattern config), not an error."
  - name: "scoreAll"
    type: "function"
    signature: "scoreAll(repoState: RepoState): Array<{ id: string, score: number, evidence: string[] }>"
    params:
      - name: "repoState"
        type: "RepoState"
        required: true
    returns: "All three patterns' detect() results, sorted descending by score"
    description: "Deterministic, pure scoring — no I/O. Computes the six DetectionSignals booleans exactly once via a shared internal helper, computeDetectionSignals(repoState), then calls each of the three pattern modules' detect(signals) with that same precomputed signals object (see pattern.detect, above). Before evaluating hasDevBranch/hasReleaseOrHotfixBranch, computeDetectionSignals normalizes every branch name in repoState.branches.local using a concrete, unambiguous algorithm — NOT a blind strip-to-first-slash, which would corrupt a purely local release/1.2.0 or hotfix/1.2.3 branch name (see INV-MP-6) into 1.2.0/1.2.3, destroying hasReleaseOrHotfixBranch for exactly the un-pushed local branches this feature needs to recognize. The algorithm: enumerate configured remote names first (git remote, e.g. typically just origin); then, for each branch name, if it starts with <remote-name>/ for one of those exact configured remote names, strip that prefix before pattern-matching; otherwise leave it unchanged. This normalizes origin/dev -> dev (origin is configured) while leaving a local release/1.2.0 untouched (release is never a configured remote name). repoState's branch list can contain remote-tracking names like origin/dev on a repo that hasn't checked out every branch locally, and the anchored regexes would otherwise silently fail to match them. Only ever invoked during first-run setup against a repo with no existing .github/shipflow.json; a re-run never calls this."
  - name: "pattern.detect"
    type: "function"
    signature: "detect(signals: DetectionSignals): { score: number, evidence: string[] }"
    params:
      - name: "signals"
        type: "DetectionSignals"
        required: true
    returns: "A 0-1 confidence score plus the evidence strings that produced it"
    description: "Per-pattern deterministic point-scoring function, implemented once per lib/patterns/<id>/index.mjs. Fixed rule table, no fuzzy matching or ML. Takes the precomputed DetectionSignals object (hasDevBranch, hasReleaseOrHotfixBranch, hasGitflowMarker, hasRestrictedPromotionWorkflow, hasUnrestrictedAutomergeWorkflow, hasTagsFromMain), NOT raw RepoState — pattern-registry.mjs's scoreAll(repoState) computes these six booleans exactly once via a shared internal helper, computeDetectionSignals(repoState), and passes that same signals object to all three pattern modules' detect(signals). No pattern module re-derives these signals itself, which would risk three independently-written branch-name regex/workflow-scan implementations drifting apart."
  - name: "pattern.protectedBranches"
    type: "function"
    signature: "protectedBranches(config: Config): string[]"
    params:
      - name: "config"
        type: "Config"
        required: true
    returns: "Branch names this pattern's deletion-protection ruleset must cover"
    description: "[main] for github-flow; [dev, main] for dev-main-promotion; [config.branches.dev, main] for gitflow (branches.dev is the sole source of truth for gitflow's develop-branch name — there is no separate patternConfig.gitflow.developBranch). release/*/hotfix/* are deliberately excluded under gitflow — they are transient and cleaned up post-merge like feature branches. Both plan.mjs and apply.mjs call this function fresh, independently, on every single run — plan.mjs to compute the human-readable preview it shows the user, apply.mjs to compute the real GitHub API mutation. Neither ever reads config.branchCleanup.protectedBranches back as an input for anything. The branchCleanup.protectedBranches value written into .github/shipflow.json is purely an output — a record of what plan.mjs most recently computed and displayed — never a second independent source of truth a user could let drift, and never a fallback either side reads from. Mechanism: computePlan calls this function internally and surfaces the result as a new Plan.protectedBranches field (see the computePlan entry, below). Persistence is agent-driven, not CLI code: bin/shipflow.js's cmdApply (and every other command) only prints JSON to stdout — there is no code path in bin/shipflow.js that writes .github/shipflow.json today, for renderedTemplateHashes or anything else. renderedTemplateHashes is written only via SKILL.md's step 10 ('Report the result'), which instructs the orchestrating agent to update .github/shipflow.json's renderedTemplateHashes field after reading apply's JSON output and commit it alongside the rendered workflow file. Plan.protectedBranches is persisted the identical way — the agent reads the new field off plan's JSON output and writes it into branchCleanup.protectedBranches following an equivalent SKILL.md instruction — the same existing agent-followed-prose mechanism, not a new one."
  - name: "pattern.templateTargetPaths"
    type: "constant"
    signature: "templateTargetPaths: string[]"
    params: []
    returns: "The fixed .github/workflows/*.yml target path(s) this pattern always writes, independent of any config"
    description: "NEW, config-independent export alongside templates(config) — a plain array constant, not a function. Target file PATHS never actually depend on config in this design: every pattern's rendered file always lands at the same fixed path regardless of branch names (dev-main-promotion always writes .github/workflows/dev-to-main-automerge.yml; github-flow always writes .github/workflows/main-automerge.yml; gitflow always writes the same four fixed paths under .github/workflows/) — only the rendered CONTENT (params) varies by config, never the path. detect.mjs builds its repoState.templateFiles union by calling pattern-registry.mjs's listPatterns() (which returns each pattern's id AND this templateTargetPaths field — see the listPatterns entry, above) and flat-mapping templateTargetPaths across every returned entry, then hashing whichever of those paths exist on disk — detect.mjs never imports a lib/patterns/<id>/index.mjs module directly, no config is needed, and no call to templates(config) is needed, so there is nothing circular about enumerating candidate paths before a pattern is resolved (see the lib/detect.mjs integration_points entry, below). Each entry templates(config) returns always has a targetPath drawn from this same constant array."
  - name: "pattern.templates"
    type: "function"
    signature: "templates(config: Config): Array<{ id: string, targetPath: string, templateSourcePath: string, params: object }>"
    params:
      - name: "config"
        type: "Config"
        required: true
    returns: "One entry per workflow file this pattern renders into the target repo's .github/workflows/"
    description: "Replaces the single hardcoded TEMPLATE_RELATIVE_PATH constant in the pre-multi-pattern plan.mjs. dev-main-promotion and github-flow each return one entry; gitflow returns four (release-automerge, hotfix-automerge, hotfix-merge-back, release-merge-back). templateSourcePath is a PATH to the .tmpl file within the skill package's templates/<pattern>/ directory — NOT its content, and NOT the same thing as computePlan's templateSources parameter (see the computePlan entry, below). The caller (SKILL.md/bin/shipflow.js) reads each entry's templateSourcePath off disk and uses its file content to build the templateSources: Record<string, string> map (keyed by each entry's id) that gets passed into computePlan; templates() itself does no I/O. Only two substituted tokens across all these templates are genuinely new (RELEASE_BRANCH_PREFIX, HOTFIX_BRANCH_PREFIX, used only by gitflow's four templates) and must have a registered validator in render.mjs's TOKEN_VALIDATORS before gitflow ships — see INV-MP-11. Every other token these templates use (branch names) reuses an existing, already-validated entry (DEV_BRANCH/MAIN_BRANCH/MERGE_FLAG/RELEASE_CREDENTIAL_SECRET). Unlike templateTargetPaths (above), this function requires a resolved config and is never called by detect.mjs's union-building step."
  - name: "computePlan"
    type: "function"
    signature: "computePlan(repoState: RepoState, config: Config, templateSources: Record<string, string>): Plan"
    params:
      - name: "repoState"
        type: "RepoState"
        required: true
      - name: "config"
        type: "Config"
        required: true
      - name: "templateSources"
        type: "Record<string, string>"
        required: true
    returns: "Plan { creates, updates, noops, sourceStateHash, liveRequiredChecks, protectedBranches } — the prior contract's shape plus one new field, protectedBranches: string[], computed internally by calling the resolved pattern's protectedBranches(config); computePlan remains pure/no-I/O, it just also returns this value instead of computing and discarding it (see the branchCleanup.protectedBranches write-mechanism note below)"
    description: "computePlan's only genuinely-changed parameter in this design: its third parameter widens from the live code's current single templateSource: string (see lib/plan.mjs's current computePlan(repoState, config, templateSource) signature) to a map keyed by each template's id, as returned per-entry by pattern.templates(config) — one string cannot carry gitflow's four independently-templated plan entries (release-automerge, hotfix-automerge, hotfix-merge-back, release-merge-back). The caller (SKILL.md/bin/shipflow.js) reads each of the resolved pattern's templates(config) entries' templateSourcePath (a path, NOT content — see pattern.templates, above) off disk and uses each file's content to build this templateSources map. computePlan itself remains a pure function with no I/O, now iterating the map instead of rendering one hardcoded string. dev-main-promotion and github-flow each populate the map with exactly one key, so this is a strict widening for those two patterns. detectRepoState and applyPlan keep their existing signatures unchanged — only computePlan's third parameter changes. Separately, computePlan's return shape (Plan) gains a new protectedBranches: string[] field (see returns, above): persistence of this field is agent-driven, not CLI code — bin/shipflow.js contains no code path that writes .github/shipflow.json (cmdApply only prints its JSON result to stdout); renderedTemplateHashes is written today only via SKILL.md's step 10 instructing the orchestrating agent to update .github/shipflow.json after reading apply's JSON output, and Plan.protectedBranches is persisted the same agent-followed-prose way, via an equivalent instruction, not a new mechanism (see pattern.protectedBranches, above, for why branchCleanup.protectedBranches is an output only, never read back as an input)."
  - name: "pattern.planEntries"
    type: "function"
    signature: "planEntries(repoState: RepoState, config: Config): PlanEntry[]"
    params:
      - name: "repoState"
        type: "RepoState"
        required: true
      - name: "config"
        type: "Config"
        required: true
    returns: "Plan entries beyond the three common ones (delete-branch-on-merge, deletion-ruleset, release-pending-label) that plan.mjs already computes generically"
    description: "v1 patterns have no additional entries beyond the three common ones and the per-template entries from pattern.templates — reserved for future patterns with pattern-unique mutations."
  - name: ".github/shipflow.json (workflowPattern field)"
    type: "interface"
    signature: "new optional top-level config field"
    params:
      - name: "workflowPattern"
        type: "\"dev-main-promotion\" | \"github-flow\" | \"gitflow\" | undefined"
        required: false
      - name: "patternConfig"
        type: "{ gitflow?: { releaseBranchPrefix: string, hotfixBranchPrefix: string } }"
        required: false
    returns: "n/a (config file)"
    description: "Additive-only change to the existing schema (see the prior shipflow-skill-contract.yaml for the full pre-existing field set, all unchanged). Absence of workflowPattern is backward-compatible shorthand for dev-main-promotion, not an error state."

invariants:
  checkable:
    - id: "INV-MP-1"
      description: "A config with no workflowPattern field resolves to dev-main-promotion everywhere it is read — never undefined, never a crash, never a different implicit default"
      verification: "resolvePattern({}) and resolvePattern({...no workflowPattern key}) both return the dev-main-promotion module"
      check_method: "code-inspection"
    - id: "INV-MP-2"
      description: "deletion-ruleset's ref_name.include list is always derived by apply.mjs's applyOne calling the resolved pattern's protectedBranches(config) directly, fresh, for the real mutation — never a hardcoded [dev, main] literal, and never read back from the stored config.branchCleanup.protectedBranches snapshot. plan.mjs's preview is computed the same way: it also calls protectedBranches(config) fresh rather than reading the stored field — that field is purely an output record of plan.mjs's most recent computation, never an input to either side (see pattern.protectedBranches, above)"
      verification: "Grep apply.mjs's deletion-ruleset branch inside applyOne for a call to protectedBranches(config) feeding ref_name.include, and confirm that same code path never references config.branchCleanup.protectedBranches or a hardcoded config.branches.dev/main literal"
      check_method: "grep"
      supersedes_note: "Narrows the 2026-07-14 contract's INV-2 (\"config.branches.main and config.branches.dev always appear in branchCleanup.protectedBranches ... for any branch-name configuration\"), which was written when dev-main-promotion was the only pattern. INV-2 continues to hold exactly as originally written only for dev-main-promotion and gitflow (both have a config.branches.dev); under github-flow it does not apply — protectedBranches(config) correctly returns [main] only, since there is no dev branch to protect by design. See INV-MP-3 and AMB-MP-4, below, for the same narrowing applied to the gitflow release/hotfix case."
    - id: "INV-MP-3"
      description: "release/* and hotfix/* branches never appear in branchCleanup.protectedBranches under gitflow"
      verification: "gitflow's protectedBranches(config) output contains exactly [config.branches.dev, main] for any valid config — patternConfig.gitflow holds only releaseBranchPrefix/hotfixBranchPrefix, never a duplicate developBranch value"
      check_method: "code-inspection"
      supersedes_note: "Confirms the 2026-07-14 contract's INV-2 holds for gitflow specifically (config.branches.dev + main are protected); see INV-MP-2's supersedes_note and AMB-MP-4 for the full narrowing across all three patterns, including github-flow where INV-2 does not apply."
    - id: "INV-MP-4"
      description: "In the SKILL.md-driven setup-wizard flow, detection (scoreAll) only runs when existingConfig is null; the re-run/audit branch of that flow never calls it. This constrains the wizard's own control flow, not the `shipflow detect` CLI subcommand: cmdDetect is a standalone, always-invocable diagnostic primitive (like `shipflow plan`) that computes scoreAll unconditionally every time it runs — it is never itself gated on existingConfig, and calling it does not constitute the wizard 'running detection' in the sense this invariant restricts."
      verification: "SKILL.md / setup-wizard code path: scoreAll is only reachable from the first-run branch, never the re-run/audit branch. Separately, bin/shipflow.js's cmdDetect computing scoreAll unconditionally is compliant by design, not a violation — the wizard's re-run branch simply never invokes cmdDetect at all."
      check_method: "code-inspection"
    - id: "INV-MP-5"
      description: "Relocating the dev-main-promotion template file under templates/dev-main-promotion/ does not invalidate any already-recorded renderedTemplateHashes entry"
      verification: "renderedTemplateHashes keys are the target-repo output path (.github/workflows/dev-to-main-automerge.yml), never the skill package's internal template source path"
      check_method: "code-inspection"
    - id: "INV-MP-11"
      description: "The two new substitution tokens this design introduces (RELEASE_BRANCH_PREFIX, HOTFIX_BRANCH_PREFIX) each have a registered validator in render.mjs's TOKEN_VALIDATORS/TOKEN_TO_PARAM before gitflow's templates can render. Every other template in this design (github-flow's main-automerge.yml.tmpl; gitflow's own branch-name references, which reuse DEV_BRANCH) introduces no new token at all, reusing existing already-validated entries (DEV_BRANCH/MAIN_BRANCH/MERGE_FLAG/RELEASE_CREDENTIAL_SECRET)"
      verification: "Grep render.mjs's TOKEN_VALIDATORS and TOKEN_TO_PARAM objects for an entry matching every {{TOKEN}} placeholder appearing across templates/**/*.tmpl. Note the asymmetry in the current code: a placeholder whose token is genuinely absent from TOKEN_TO_PARAM does fail renderTemplate's missing-param check at runtime, but a token present in TOKEN_TO_PARAM with no TOKEN_VALIDATORS entry does NOT fail anything today — the validator lookup (TOKEN_VALIDATORS[name]) returns undefined, the `if (validate && !validate(value))` guard short-circuits false, and substitution proceeds with zero validation. What makes this invariant hold at runtime, for real, is the new self-check assertion this design adds to render.mjs (see INV-MP-12): it asserts, at module load or the top of renderTemplate, that every TOKEN_TO_PARAM key has a matching TOKEN_VALIDATORS key, throwing before any template can render otherwise. Verification for this invariant is therefore: (1) grep confirms RELEASE_BRANCH_PREFIX/HOTFIX_BRANCH_PREFIX are present in both maps by inspection, and (2) INV-MP-12 confirms the runtime assertion that would catch it if they weren't"
      check_method: "grep"
    - id: "INV-MP-12"
      description: "render.mjs contains a self-check assertion — run at module load (or at the top of renderTemplate) — that every key present in TOKEN_TO_PARAM has a corresponding key in TOKEN_VALIDATORS, throwing a clear internal error if any TOKEN_TO_PARAM key lacks a matching TOKEN_VALIDATORS entry. This closes the gap identified in INV-MP-11: without this assertion, a token added to TOKEN_TO_PARAM but missing from TOKEN_VALIDATORS would silently substitute with zero validation instead of failing fast. The assertion logic is exported as its own pure function, assertTokenValidatorsComplete(tokenToParam, tokenValidators), which throws if any key of tokenToParam is missing from tokenValidators; module load calls this function once against the real TOKEN_TO_PARAM/TOKEN_VALIDATORS singletons — that call is what enforces the invariant at runtime."
      verification: "Grep render.mjs for the exported assertTokenValidatorsComplete function and confirm module load calls it unconditionally, once, against the real TOKEN_TO_PARAM/TOKEN_VALIDATORS singletons, before any template substitution happens. As a runtime check: a unit test calls the exported assertTokenValidatorsComplete function directly with deliberately mismatched local, plain-object fixtures (NOT the frozen singletons) — asserting it throws for an inconsistent {tokenToParam, tokenValidators} pair and does not throw for a consistent one. This genuinely exercises the real assertion logic — deleting it from render.mjs would make this test fail — unlike a test that only checks Object.keys(TOKEN_TO_PARAM).every(key => key in TOKEN_VALIDATORS) against today's live exported objects, which would keep passing even if the runtime assertion were removed entirely. It also sidesteps two practical problems a singleton-mutation test would hit: the live TOKEN_VALIDATORS is Object.freeze-d (see render.mjs), so deleting a property from it either throws (strict mode) or silently no-ops (non-strict) instead of cleanly removing the entry; and the module-load assertion runs only once per process, which would otherwise require module-cache-busting tricks to re-trigger for a second observation. Calling the exported function directly with fresh local fixtures avoids both problems."
      check_method: "code-inspection"
  testable:
    - id: "INV-MP-6"
      description: "Clean gitflow signal: given a synthetic repoState with a develop branch (hasDevBranch=true) AND an open release/1.2.0 branch (hasReleaseOrHotfixBranch=true), no gitflow marker, no matching workflow, scoreAll produces gitflow=1.0 (+0.5 hasDevBranch, +0.5 hasReleaseOrHotfixBranch), dev-main-promotion=0 (its hasDevBranch AND NOT hasReleaseOrHotfixBranch signal fails because a release branch exists), github-flow=0 — top=1.0, gap=1.0 > 0.3 → Confident: gitflow"
      verification: "Unit test against pattern-registry.mjs with a fixture repoState, asserting scoreAll(...) ranks gitflow first with score 1.0 and a gap over 0.3 to the second-place score"
      test_tag: "contract:detect-ranking:inv-mp-6"
    - id: "INV-MP-7"
      description: "Bare repo: given a synthetic repoState with only main and no other signals (no tags, no workflow files, no branches beyond main), scoreAll produces github-flow=0.3 (its +0.3 rule for NOT hasDevBranch AND NOT hasReleaseOrHotfixBranch; no positive signal for the +0.5 rule), dev-main-promotion=0, gitflow=0 — top=0.3, which is below the 0.4 greenfield threshold, so all three fall to Greenfield"
      verification: "Unit test asserting scoreAll(...)[0].score < 0.4 (and specifically == 0.3) for a bare-main fixture"
      test_tag: "contract:greenfield-threshold:inv-mp-7"
    - id: "INV-MP-8"
      description: "hotfix-merge-back's and release-merge-back's conflict-or-any-push-failure path never force-pushes or silently resolves a failed merge into config.branches.dev; it opens a PR instead, for a merge conflict, a rejected push, or any other push failure"
      verification: "Integration test: seed config.branches.dev with a conflicting commit relative to main (and, separately, simulate a rejected push), run the hotfix-merge-back and release-merge-back workflow logic, assert a PR was opened and no push to config.branches.dev occurred in either case"
      test_tag: "contract:hotfix-mergeback-conflict:inv-mp-8"
    - id: "INV-MP-9"
      description: "Running apply.mjs twice against an unchanged github-flow-pattern repo produces zero mutating calls on the second run"
      verification: "Integration test against a sandbox repo configured with workflowPattern: github-flow, mirroring the existing dev-main-promotion idempotency test (INV-9 in the prior contract)"
      test_tag: "contract:idempotency-github-flow:inv-mp-9"
    - id: "INV-MP-10"
      description: "Ambiguous residual case: given a synthetic repoState with only a hotfix/1.2.3 branch (hasReleaseOrHotfixBranch=true) and no dev/develop/staging branch (hasDevBranch=false), nothing else, scoreAll produces gitflow=0.5 (+0.5 hasReleaseOrHotfixBranch only), dev-main-promotion=0, github-flow=0. top=0.5 fails Confident (needs >=0.7) and is not < 0.4 so it also fails Greenfield — it falls to Ambiguous as the residual/else case, not because of a separate close-score check between top and second-place. (Note: a repo with both a dev branch AND a release/hotfix branch is NOT this case — it scores gitflow=1.0 vs. dev-main-promotion=0, a decisive Confident: gitflow, since dev-main-promotion's own hasDevBranch AND NOT hasReleaseOrHotfixBranch signal requires the release/hotfix branch's absence.)"
      verification: "Unit test with the hotfix-only fixture repoState above, asserting scoreAll(...)[0].score (0.5) fails both the Confident (>=0.7 and >0.3 gap) and Greenfield (<0.4) conditions and is therefore classified Ambiguous by the residual else branch, not by a separate close-score comparison"
      test_tag: "contract:ambiguous-mixed-signals:inv-mp-10"

integration_points:
  - "lib/detect.mjs — gains a call into pattern-registry.mjs's scoreAll during first-run detection. repoState.templateFiles is NOT unchanged: it generalizes from a single hardcoded TEMPLATE_RELATIVE_PATH key to a map keyed by the UNION of every registered pattern module's templateTargetPaths constant (all ~6 template files across all 3 patterns) — templateTargetPaths is a plain, config-independent array export (NOT a function, and distinct from templates(config)) on every lib/patterns/<id>/index.mjs, since target file PATHS never depend on config in this design (only the rendered CONTENT does). detect.mjs builds the union by calling pattern-registry.mjs's listPatterns() (which returns each pattern's id AND templateTargetPaths, per the widened listPatterns signature above) and flat-mapping templateTargetPaths across every returned entry, then hashing whichever of those paths exist on disk, computed unconditionally with no resolved pattern in hand and no call to templates(config) — there is no config yet on a genuine first run, so nothing to call resolvePattern(config) with, and this avoids that circularity entirely. detect.mjs never imports a lib/patterns/<id>/index.mjs module directly — it only ever calls listPatterns(). This is what keeps \"adding a 4th pattern needs no changes to detect.mjs/plan.mjs/apply.mjs\" true in practice: a new pattern registers itself once, inside pattern-registry.mjs, and every caller that only goes through the registry's own functions (listPatterns/resolvePattern/scoreAll) picks it up automatically. repoState also gains three new raw-material fields that computeDetectionSignals needs and today's repoState does not carry: tags reachable from main's history (for hasTagsFromMain); a .gitflow marker-file/git-config check (for hasGitflowMarker); and, for hasRestrictedPromotionWorkflow/hasUnrestrictedAutomergeWorkflow, a NEW text-based heuristic scan detect.mjs must add — distinct from, and in addition to, the existing job-name-only listWorkflowJobNames() (which extracts bare job names from pull_request-triggered files and has no notion of an if: guard or head-ref comparison at all). The new scan is consistent with this file's existing no-YAML-parser style (the same style as SETTINGS_AS_CODE_CONTENT_RE's content-pattern match and PULL_REQUEST_TRIGGER_RE's trigger-section scan): it looks for a gh pr merge --auto step in each candidate workflow file, then separately checks whether that step's surrounding job/step condition contains a head.ref ==-style comparison against one specific literal branch name — presence of such a comparison is hasRestrictedPromotionWorkflow evidence; a qualifying auto-merge workflow with no such comparison is hasUnrestrictedAutomergeWorkflow evidence. The 'surrounding job/step condition' boundary is one level FINER than the whole-jobs:-section boundary listWorkflowJobNames() already implements — not the identical boundary. Reusing listWorkflowJobNames()'s existing boundary as-is (the jobs: line down to the first line that dedents back to column 0) would scope across every job in the file, not one job's own block, letting an unrelated job's head.ref == condition get misattributed to a different job's gh pr merge --auto step in a multi-job file. Instead: find each individual job's own line range — from that job's own name line (matching the same jobNameRe pattern listWorkflowJobNames() already uses, /^\\s{2}([\\w.-]+):\\s*$/, at 2-space indent) down to the next line at that same or lesser indent (the next sibling job's name line, or end of file). The gh pr merge --auto step and the head.ref == comparison must both fall within that same individual job's line range to count as evidence for that file — a head.ref == comparison found in a different job's block, or in the file's on:/trigger section above jobs:, does not qualify, distinguishing this from both a naive whole-file text search and a whole-jobs-section scan. Additionally, computeDetectionSignals normalizes every branch name in repoState.branches.local before hasDevBranch/hasReleaseOrHotfixBranch pattern-match it, using a concrete algorithm — NOT a blind strip-to-first-slash (which would corrupt a purely local release/1.2.0 into 1.2.0): enumerate configured remote names via git remote, then strip a <remote-name>/ prefix only when it exactly matches one of those configured remote names, leaving every other branch name (including a local release/*/hotfix/* branch) unchanged. detect.mjs's existing git branch -a --format=%(refname:short) call returns remote-tracking names like origin/dev on a repo that hasn't checked out every branch locally, and the anchored regexes would otherwise silently fail to match those. repoState's remaining fields (branches, workflow job names, protection, rulesets, etc.) are unchanged."
  - "lib/plan.mjs — computeTemplatePlanEntry (singular) generalizes to loop over pattern.templates(config) (plural), reading only the subset of the broad repoState.templateFiles map above whose keys match the now-resolved pattern's own templates(config) targetPaths, for its per-file hash-diff (hand-edit detection); the 3 common plan entries now read pattern.protectedBranches(config) instead of a hardcoded branch pair. computePlan's third parameter changes from a single templateSource: string to templateSources: Record<string, string> keyed by each pattern.templates(config) entry's id (built by the caller from each entry's templateSourcePath — a path, not content) — this is the one genuine parameter-signature change in this design; detectRepoState and applyPlan keep their existing signatures unchanged. computePlan's return shape also gains one new field, protectedBranches: string[] (computed internally via the resolved pattern's protectedBranches(config), still pure/no I/O — see the computePlan entry in api_surface, above), which is persisted the same agent-driven way renderedTemplateHashes already is today (via SKILL.md's step 10 instruction to the orchestrating agent after it reads the CLI's JSON output — bin/shipflow.js itself contains no code path that writes .github/shipflow.json)."
