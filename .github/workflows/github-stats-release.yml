name: github-stats-release

# Independent, manifest-driven release for the github-stats skill. The version
# lives in the SKILL.md frontmatter (`version:`), the source of truth. Bump it
# (+ CHANGELOG) in a PR; merging to main tags `github-stats-v<version>` and
# publishes a Release — only if that version isn't already tagged.
on:
  push:
    branches: [main]
    paths: ["skills/github-stats/**"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-github-stats
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: skills/github-stats
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from SKILL.md frontmatter
        id: ver
        run: |
          V=$(grep -m1 '^version:' SKILL.md | sed 's/^version:[[:space:]]*//' | tr -d '"')
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: Check whether this version is already tagged
        id: tag
        run: |
          if git rev-parse "github-stats-v${{ steps.ver.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "github-stats-v${{ steps.ver.outputs.version }} already released — skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract release notes from CHANGELOG
        if: steps.tag.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          awk -v ver="$VERSION" '
            /^## / && index($0, ver) {flag=1; next}
            flag && /^## / {flag=0}
            flag {print}
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            printf 'github-stats v%s\n' "$VERSION" > release-notes.md
          fi

      - name: Create tag and GitHub Release
        if: steps.tag.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "github-stats-v${{ steps.ver.outputs.version }}" \
            --target "${{ github.sha }}" \
            --title "github-stats v${{ steps.ver.outputs.version }}" \
            --notes-file release-notes.md
