name: ci

on:
  pull_request:
    branches: [dev, master]
  push:
    branches: [dev, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      # Offline unit suite — no network, no paid LLM calls.
      - run: npm test
      # Eval harness wiring check in MOCK mode ($0). Exercises the scorer +
      # deterministic rule checks on a fixed sample. The live-tailoring eval
      # (real claude -p) requires a subscription session and is run locally,
      # not in CI.
      - run: MOCK_LLM=1 npm run eval
