name: CI

# A skill is code. Validate it like code: lint the bash, test the Python at 100%
# coverage, and score the SKILL.md. Fails the build if any pillar regresses.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint shell scripts
        run: shellcheck scripts/release_radar.sh

      - name: Run tests with 100% coverage gate
        run: pytest --cov=scripts --cov-report=term-missing --cov-fail-under=100

      - name: Score SKILL.md
        run: python scripts/score_skill.py
