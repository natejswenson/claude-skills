name: auto-merge dev to main

# When a PR is opened from `dev` into `main`, enable GitHub's native auto-merge so
# the PR merges itself once all required `ci / <skill>` checks pass. If any check
# fails, GitHub never merges. A DRAFT PR is the hold mechanism — it won't auto-merge
# until marked ready for review.
#
# Uses `pull_request_target` so the job gets a write-scoped token and runs from the
# BASE branch's copy of this workflow (it does NOT check out or run PR code, so this
# is safe). Note the bootstrap: this file must exist on `main` before it can fire on a
# dev→main PR, so the very first promotion PR (the one that adds this file) is merged
# by hand; every dev→main PR after that auto-merges.
#
# Release tagging is intentionally DECOUPLED from auto-merge. This merge runs as the
# default GITHUB_TOKEN, which (by GitHub's loop-prevention) does NOT trigger the per-skill
# release workflows — so an auto-merge never cuts a release on its own. Release tags are a
# separate, deliberate step: after opening a dev→main PR, decide whether a release is needed
# and cut it manually. See CLAUDE.md → Release process.

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-auto-merge:
    # Only the dev→main promotion PR, and not while it is a draft.
    if: github.head_ref == 'dev' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Enable native auto-merge (merge commit)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr merge "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --auto --merge
