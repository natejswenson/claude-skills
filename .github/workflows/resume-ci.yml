name: resume-ci

# Path-filtered CI for the resume skill: offline unit suite + a $0 MOCK eval
# wiring check. The live-tailoring eval (real `claude -p`) needs a subscription
# session and is run locally, not in CI.
on:
  push:
    branches: [main]
    paths: ["skills/resume/**", ".github/workflows/resume-ci.yml"]
  pull_request:
    paths: ["skills/resume/**", ".github/workflows/resume-ci.yml"]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: skills/resume
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: skills/resume/package-lock.json
      - run: npm ci
      # Offline unit suite — no network, no paid LLM calls.
      - run: npm test
      # Eval harness wiring check in MOCK mode ($0).
      - run: MOCK_LLM=1 npm run eval
