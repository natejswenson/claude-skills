name: _release

# Reusable, version-driven release for any skill in the monorepo. Called by each
# per-skill caller's `release` job (which runs only on push to main, after `ci`).
# Resolves the skill's version (package.json if present, else SKILL.md frontmatter),
# and if `<skill>-v<version>` isn't already tagged, cuts the tag + a GitHub Release
# with notes from that skill's CHANGELOG. Idempotent: a no-version-bump merge no-ops.
on:
  workflow_call:
    inputs:
      skill:
        description: "Skill key — used as the tag prefix and working directory (skills/<skill>)."
        required: true
        type: string
      version-source:
        description: "auto | package-json | skill-md. auto = package.json if present, else SKILL.md frontmatter."
        required: false
        type: string
        default: "auto"
      npm-publish:
        description: "Publish the skill's package.json to npm when its version isn't already on the registry. Opt-in per skill."
        required: false
        type: boolean
        default: false
    secrets:
      NPM_TOKEN:
        description: "npm automation token used to authenticate `npm publish`. Required only when npm-publish is true."
        required: false

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.skill }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: skills/${{ inputs.skill }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history + tags so the "already tagged?" check works

      - name: Resolve version
        id: ver
        # SKILL.md/package.json live one level deeper than the plugin root, at
        # skills/<skill>/skills/<skill>/ -- Claude Code's plugin auto-discovery
        # path. CHANGELOG.md (read by later steps) stays at the plugin root, so
        # only this step and the npm-publish step override working-directory.
        working-directory: skills/${{ inputs.skill }}/skills/${{ inputs.skill }}
        run: |
          set -euo pipefail
          read_pkg() { node -p "require('./package.json').version"; }
          # Frontmatter-only: read `version:` ONLY from the YAML block between the
          # first two `---` lines. Never a whole-file grep (a `version:` inside a
          # body code block must never be matched).
          read_fm() {
            awk '
              NR==1 && $0!="---" { exit 0 }
              NR==1 { infm=1; next }
              infm && $0=="---" { exit 0 }
              infm && /^version:[[:space:]]*/ {
                sub(/^version:[[:space:]]*/, ""); gsub(/"/, ""); print; exit 0
              }
            ' SKILL.md
          }
          case "${{ inputs.version-source }}" in
            package-json) V="$(read_pkg)" ;;
            skill-md)     V="$(read_fm)" ;;
            *)            if [ -f package.json ]; then V="$(read_pkg)"; else V="$(read_fm)"; fi ;;
          esac
          if [ -z "${V:-}" ]; then
            echo "::error::Could not resolve a version for skill '${{ inputs.skill }}' (no package.json version and no frontmatter version:)."
            exit 1
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Resolved ${{ inputs.skill }} version: $V"

      - name: Check whether this version is already tagged
        id: tag
        run: |
          if git rev-parse "${{ inputs.skill }}-v${{ steps.ver.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "${{ inputs.skill }}-v${{ steps.ver.outputs.version }} already released — skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract release notes from CHANGELOG
        if: steps.tag.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          # Print the lines under the first "## ..." heading containing VERSION, up to
          # the next "## " heading. Handles both "## 1.2.3 (...)" and "## [1.2.3] - ...".
          awk -v ver="$VERSION" '
            /^## / && index($0, ver) {flag=1; next}
            flag && /^## / {flag=0}
            flag {print}
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            printf '%s v%s\n' "${{ inputs.skill }}" "$VERSION" > release-notes.md
          fi

      - name: Create tag and GitHub Release
        if: steps.tag.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ inputs.skill }}-v${{ steps.ver.outputs.version }}" \
            --target "${{ github.sha }}" \
            --title "${{ inputs.skill }} v${{ steps.ver.outputs.version }}" \
            --notes-file release-notes.md

      # npm publish is intentionally INDEPENDENT of the "already tagged?" check
      # above: it republishes nothing (guarded by `npm view`) but will catch the
      # registry up if a prior release cut the GitHub tag without publishing to
      # npm. Opt-in per skill via the `npm-publish` input.
      - name: Setup Node for npm publish
        if: inputs.npm-publish
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Publish to npm if not already published
        if: inputs.npm-publish
        working-directory: skills/${{ inputs.skill }}/skills/${{ inputs.skill }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          if [ ! -f package.json ]; then
            echo "::notice::No package.json in skills/${{ inputs.skill }}/skills/${{ inputs.skill }}; nothing to publish."
            exit 0
          fi
          PKG="$(node -p "require('./package.json').name")"
          VER="$(node -p "require('./package.json').version")"
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "::error::npm-publish is enabled but the NPM_TOKEN secret is empty. Set NPM_TOKEN (repo secret) and pass it via the caller's secrets."
            exit 1
          fi
          if npm view "$PKG@$VER" version >/dev/null 2>&1; then
            echo "$PKG@$VER is already on npm — skipping publish."
            exit 0
          fi
          echo "Publishing $PKG@$VER to npm (scoped package → --access public)…"
          npm publish --access public
