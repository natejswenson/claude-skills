name: ghostwriter

# Per-skill CI + release for the ghostwriter skill (Python). See devlog.yml for the
# PR/push trigger + change-detection rationale. SKILL.md scoring now comes from the
# shared Tier-1 gate (tools/score_skill.py); ghostwriter's bespoke score_skill.py is
# removed (see the design doc's score_skill.py consolidation).
on:
  push:
    branches: [main]
    paths: ["skills/ghostwriter/**", "tools/score_skill.py", ".github/workflows/ghostwriter.yml"]
  pull_request:
    branches: [dev, main]
  workflow_dispatch:

jobs:
  ci:
    name: ci / ghostwriter # distinct check-run name so it can be a required status check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read # required by dorny/paths-filter on pull_request events
    steps:
      - uses: actions/checkout@v7
      - name: Detect relevant changes
        id: changes
        uses: dorny/paths-filter@v4
        with:
          filters: |
            ghostwriter:
              - 'skills/ghostwriter/**'
              - 'tools/score_skill.py'
              - '.github/workflows/ghostwriter.yml'
      - if: steps.changes.outputs.ghostwriter == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      # Tier 1: shared SKILL.md structural lint
      - if: steps.changes.outputs.ghostwriter == 'true'
        run: python tools/score_skill.py skills/ghostwriter --min 100
      # Tier 2: lint the bash, test the Python at 100% coverage
      - if: steps.changes.outputs.ghostwriter == 'true'
        run: pip install -r requirements-dev.txt
        working-directory: skills/ghostwriter
      - if: steps.changes.outputs.ghostwriter == 'true'
        run: shellcheck scripts/release_radar.sh
        working-directory: skills/ghostwriter
      - if: steps.changes.outputs.ghostwriter == 'true'
        run: pytest --cov=scripts --cov-report=term-missing --cov-fail-under=100
        working-directory: skills/ghostwriter

  release:
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/_release.yml
    with:
      skill: ghostwriter
    permissions:
      contents: write
