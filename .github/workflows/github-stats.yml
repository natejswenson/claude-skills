name: github-stats

# Per-skill CI + release for the github-stats skill (Python). See devlog.yml for the
# PR/push trigger + change-detection rationale. The live smoke test and the eval
# (which need gh auth / the original repo) are intentionally not run here.
on:
  push:
    branches: [main]
    paths: ["skills/github-stats/**", "tools/score_skill.py", ".github/workflows/github-stats.yml"]
  pull_request:
    branches: [dev, main]
  workflow_dispatch:

jobs:
  ci:
    name: ci / github-stats # distinct check-run name so it can be a required status check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read # required by dorny/paths-filter on pull_request events
    steps:
      - uses: actions/checkout@v7
      - name: Detect relevant changes
        id: changes
        uses: dorny/paths-filter@v4
        with:
          filters: |
            github-stats:
              - 'skills/github-stats/**'
              - 'tools/score_skill.py'
              - '.github/workflows/github-stats.yml'
      - if: steps.changes.outputs.github-stats == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      # Tier 1: shared SKILL.md structural lint
      - if: steps.changes.outputs.github-stats == 'true'
        run: python tools/score_skill.py skills/github-stats --min 100
      # Tier 2: lint the bash, run the network-free unit tests
      - if: steps.changes.outputs.github-stats == 'true'
        run: pip install -r requirements-dev.txt
        working-directory: skills/github-stats
      - if: steps.changes.outputs.github-stats == 'true'
        run: shellcheck scripts/gh-stats.sh
        working-directory: skills/github-stats
      - if: steps.changes.outputs.github-stats == 'true'
        run: pytest tests/ -v
        working-directory: skills/github-stats

  release:
    needs: ci
    # Real push to main (when re-coupled via a PAT) OR a deliberate manual dispatch on main.
    # The bot GITHUB_TOKEN auto-merge doesn't trigger push events, so workflow_dispatch is the on-demand release path.
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    uses: ./.github/workflows/_release.yml
    with:
      skill: github-stats
    permissions:
      contents: write
