name: release

# When a PR is merged to master (i.e. master receives a push), tag and publish
# a GitHub Release for the version in package.json — but only if that version
# isn't already released. Semantic versioning is driven by the version field:
# bump package.json (+ SKILL.md frontmatter + CHANGELOG) in the PR, and merging
# cuts that release. Idempotent: pushes that don't change the version no-op.

on:
  push:
    branches: [master]

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags so the "already tagged?" check works

      - name: Read version from package.json
        id: ver
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Check whether this version is already tagged
        id: tag
        run: |
          if git rev-parse "v${{ steps.ver.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "v${{ steps.ver.outputs.version }} already released — skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract release notes from CHANGELOG
        if: steps.tag.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          # Print the lines under "## [VERSION] ..." up to the next "## " heading.
          awk -v ver="$VERSION" '
            $0 ~ ("^## \\[" ver "\\]") {flag=1; next}
            flag && /^## / {flag=0}
            flag {print}
          ' CHANGELOG.md > release-notes.md
          # Fall back to a minimal note if the section is empty/missing.
          if [ ! -s release-notes.md ]; then
            printf 'Release v%s\n' "$VERSION" > release-notes.md
          fi

      - name: Create tag and GitHub Release
        if: steps.tag.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.ver.outputs.version }}" \
            --target "${{ github.sha }}" \
            --title "v${{ steps.ver.outputs.version }}" \
            --notes-file release-notes.md
