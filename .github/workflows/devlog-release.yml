name: devlog-release

# Independent, manifest-driven release for the devlog skill.
# Bump skills/devlog/package.json version (+ CHANGELOG) in a PR; merging to main
# tags `devlog-v<version>` and publishes a GitHub Release — only if that version
# isn't already tagged. Idempotent: a push that doesn't change the version no-ops.
on:
  push:
    branches: [main]
    paths: ["skills/devlog/**"]

permissions:
  contents: write

concurrency:
  group: release-devlog
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: skills/devlog
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags so the "already tagged?" check works

      - name: Read version from package.json
        id: ver
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Check whether this version is already tagged
        id: tag
        run: |
          if git rev-parse "devlog-v${{ steps.ver.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "devlog-v${{ steps.ver.outputs.version }} already released — skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract release notes from CHANGELOG
        if: steps.tag.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          # Print the lines under the first "## ..." heading containing VERSION,
          # up to the next "## " heading. Works for both "## 1.2.3 (...)" and
          # "## [1.2.3] - ..." changelog styles.
          awk -v ver="$VERSION" '
            /^## / && index($0, ver) {flag=1; next}
            flag && /^## / {flag=0}
            flag {print}
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            printf 'devlog v%s\n' "$VERSION" > release-notes.md
          fi

      - name: Create tag and GitHub Release
        if: steps.tag.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "devlog-v${{ steps.ver.outputs.version }}" \
            --target "${{ github.sha }}" \
            --title "devlog v${{ steps.ver.outputs.version }}" \
            --notes-file release-notes.md
