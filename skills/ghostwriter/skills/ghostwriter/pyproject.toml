[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=scripts --cov=evals --cov-report=term-missing --cov-fail-under=100"

[tool.coverage.run]
source = ["scripts", "evals"]
# render_image lazily imports playwright; tests inject a fake module.
# evals/ live-API call sites are `# pragma: no cover` — only the mock paths run in CI.

[tool.coverage.report]
fail_under = 100
show_missing = true
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.:",
]
