<!doctype html>
<!--
  STEM card scaffold (the warm one — for STEM / education / outreach posts). Copy to
  images/<slug>.html, fill in, then:
    render_image.py --type card --in images/<slug>.html --out images/<slug>.png
  Same clean dark family as the other cards, kept playful by a chunky toy-block
  S T E M motif and a soft four-hue corner glow. The byline rides inline in the
  .toprow (top-right) so a feed crop can't drop it. Keep it to one punchy idea; the
  headline is the hero.
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="diagram.css" />
</head>
<body>
  <div id="canvas" class="card stem">
    <div class="blocks">
      <span class="block b1">S</span>
      <span class="block b2">T</span>
      <span class="block b3">E</span>
      <span class="block b4">M</span>
    </div>

    <div class="toprow">
      <div class="eyebrow">EYEBROW LABEL</div>
      <div class="footer brand"></div>
    </div>

    <h1>One playful line for the big idea.</h1>
    <p class="kicker">A supporting line, with the key phrase in <b>bold</b>.</p>
  </div>
</body>
</html>
